<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Esqueceu sua senha </title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="css/esqueceu.senha.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body onload="mudarposition()">
  <div class="container">
    <img class="login-img" src="./img/Imagem1.png" alt="Recuperar senha">

    <form class="form" action="codigo.recuperacao.html">
      <input
        placeholder="Digite seu E-mail ou Celular" id="emailCelular" name="emailCelular" type="text" class="input" required
        pattern="(^\d{3}\.\d{3}\.\d{3}-\d{2}$)|(^\d{11}$)|(^[^\s@]+@[^\s@]+\.[^\s@]+$)"
        title="Digite um Celular ou um e-mail válido"
      >

      <button type="submit" class="login-button">Enviar código</button>
    </form>

   
  </div>
</body>
</html>

  <script src="./js/script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
    <script src="js/telainicial.js"></script>
  
<div vw class="enabled">
  <div vw-access-button class="active"></div>
  <div vw-plugin-wrapper>
    <div class="vw-plugin-top-wrapper"></div>
  </div>
</div>
 
<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
 
<script>
  new window.VLibras.Widget('https://vlibras.gov.br/app');
</script>
<script src="https://freewebaccessible.com/dist/sienna.min.js" defer></script>
<script>
    function mudarposition() {
      let btnteste = document.querySelector(".asw-menu-btn")
      btnteste.style.top = "315px";
      btnteste.style.width = "36px";
      btnteste.style.height = "36px"; 
      btnteste.style.right = "10px"

    }
  </script>

</body>

</html>
